<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katie & Stu | Wedding Album</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; font-family: 'Inter', sans-serif; color: white; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)), url('Background.jpg');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .upload-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 16px;
            padding: 2.5rem; max-width: 450px; width: 90%;
        }
        .file-input {
            width: 100%; padding: 15px; margin: 1rem 0;
            border: 2px dashed rgba(255, 255, 255, 0.6); border-radius: 8px;
            background: rgba(0, 0, 0, 0.2); cursor: pointer; color: white; box-sizing: border-box;
        }
        .btn-primary { 
            background: white; color: #44403c; padding: 14px 36px;
            border-radius: 9999px; border: none; font-weight: 500;
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-primary:hover:not(:disabled) { background: #f5f5f4; }
    </style>
</head>
<body>

    <header class="hero-bg">
        <div class="upload-card">
            <h2 style="font-family: 'Playfair Display'; margin-top: 0;">Share Your Photos</h2>
            <form id="uploadForm">
                <div style="text-align: left;">
                    <label>Your Name:</label>
                    <input type="text" id="guestName" required style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;">
                </div>
                <input type="file" id="photoFile" accept="image/*" class="file-input" multiple required>
                <button type="submit" id="submitBtn" class="btn-primary">Upload Photos</button>
            </form>
            <div id="uploadStatus" style="margin-top: 1rem; font-weight: 500;"></div>
        </div>
    </header>

    <script>
        const form = document.getElementById("uploadForm");
        const statusText = document.getElementById("uploadStatus");
        const submitBtn = document.getElementById("submitBtn");

        async function uploadSingleFile(file, url) {
            return new Promise((resolve, reject) => {
                const fr = new FileReader();
                fr.readAsDataURL(file);
                fr.onload = (f) => {
                    const payload = {
                        filename: file.name,
                        mimeType: file.type,
                        base64: f.target.result.split(',')[1],
                        guestName: document.getElementById("guestName").value
                    };
                    fetch(url, { method: "POST", body: JSON.stringify(payload) })
                    .then(res => res.ok ? resolve() : reject())
                    .catch(reject);
                };
            });
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const files = document.getElementById("photoFile").files;
            const url = "https://script.google.com/macros/s/AKfycbzLKz47CDuVz74X3hsRSUGCc68yQg5-uP0TPeab1tiCfqLLJcgEqUyJb3lDKk1xDx3b/exec"; // <--- REPLACE THIS
            
            submitBtn.disabled = true;
            for (let i = 0; i < files.length; i++) {
                submitBtn.innerText = `Uploading ${i + 1} of ${files.length}...`;
                await uploadSingleFile(files[i], url).catch(() => console.error("Failed"));
            }
            statusText.innerText = "Thank you! Your memories have been successfully added to our collection.";
            submitBtn.innerText = "Upload More";
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
