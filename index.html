    <style>
        :root { --gold: #d4af37; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #44403c;
            margin: 0;
            line-height: 1.6;
        }
        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
        }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)), url('Background.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }
        .nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            z-index: 50;
            border-bottom: 1px solid #e7e5e4;
        }
        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.4rem;
            font-weight: 400;
            text-decoration: none;
            color: #44403c;
        }
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 4px;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            color: #44403c;
            transition: all 0.3s ease;
        }
        .nav-links a:hover {
            background: #f5f5f4;
            color: #166534;
        }
        .hero-content h1 {
            font-size: 5.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary { background: white; color: #44403c; }
        .btn-primary:hover { background: #f5f5f4; transform: translateY(-2px); }
        .btn-outline { border: 2px solid white; color: white; }
        .btn-outline:hover { background: white; color: #44403c; }
    </style>
</head>
<body>

    <nav class="nav">

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
