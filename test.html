<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Katie &amp; Stu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; color: #44403c; line-height: 1.7; }
        
        /* Layout */
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('Background.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding-top: 110px;
        }

        /* Navigation: Standardized */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.3rem; color: white; text-decoration: none; }
        
        .hamburger { display: none; font-size: 2.2rem; background: none; border: none; color: white; cursor: pointer; padding: 5px 10px; }
        .nav-links { display: flex; gap: 10px; }
        .nav-links a { padding: 10px 20px; border-radius: 9999px; font-size: 1.05rem; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.5); transition: all 0.3s; }
        .nav-links a:hover { background: white; color: #44403c; }

        /* FIXED: Mobile Navigation Padding & Logo Size */
        @media (max-width: 768px) {
            .nav-container { padding: 0.5rem 1rem !important; } /* Tighter padding for mobile */
            .logo { font-size: 1.6rem !important; } /* Smaller logo to prevent wrapping */
            .hamburger { display: block; }
            .nav-links { 
                display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(255,255,255,0.98); padding: 1.5rem; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            }
            .nav-links.show { display: flex; }
            .nav-links a { color: #44403c; text-align: center; font-size: 1.1rem; border: none; }
        }

        /* Content & Forms */
        .content { background: rgba(248, 245, 240, 0.55); padding: 3rem 2rem; max-width: 950px; width: 100%; margin: 0 1rem; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        input, select, button { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.05rem; box-sizing: border-box; }
        .masked-password-input { -webkit-text-security: disc !important; text-security: disc !important; }
        button { background: #9CAF88; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #7F8F6F; }
        .choice-btn { background: #9CAF88; margin: 12px 0; padding: 16px; font-size: 1.1rem; }
        .choice-btn:hover { background: #7F8F6F; }
        label { display: block; text-align: left; margin: 1.2rem 0 0.5rem 0; font-weight: 500; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; text-align: center; font-size: 2.8rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Katie &amp; Stu</a>
            <div class="nav-links" id="navLinks">
                <a href="about.html">Our Story</a><a href="gallery.html">Gallery</a><a href="schedule.html">Schedule</a><a href="travel.html">Travel</a><a href="guest-information.html">Guest Information</a><a href="registry.html">Registry</a><a href="rsvp.html">RSVP</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <div class="hero-bg">
        <div class="content">
            <h1>RSVP</h1>

            <div id="passwordSection">
                <p style="text-align: center;">Please enter the password below</p>
                <input type="text" id="password" class="masked-password-input" placeholder="Enter password" autocomplete="off">
                <button onclick="checkPassword()">Continue</button>
            </div>

            <div id="choiceSection" style="display: none; margin-top: 2rem;">
                <button class="choice-btn" onclick="showCheckForm()">Check My RSVP</button>
                <button class="choice-btn" onclick="showSubmitForm()">Submit New RSVP</button>
            </div>

            <div id="checkForm" style="display: none; margin-top: 2rem;">
                <h2>Check My RSVP</h2>
                <input type="email" id="checkEmail" placeholder="Enter your email">
                <button onclick="checkPreviousRSVP()">Check My RSVP</button>
                <div id="checkResult" style="margin-top: 1.5rem; min-height: 2em;"></div>
            </div>

            <div id="rsvpForm" style="display: none; margin-top: 2rem; text-align: left;">
                <h2 style="text-align: center;">New RSVP</h2>
                <input type="text" placeholder="Your Full Name" id="name" oninput="updateMealLabels()" required>
                <input type="email" placeholder="Your Email Address" id="email" required>
                <label>Will you be attending?</label>
                <select id="attendance" onchange="toggleGuestFields()" required>
                    <option value="">Please select...</option>
                    <option value="I won't be able to attend">I won't be able to attend</option>
                    <option value="Just myself">Just myself</option>
                    <option value="Myself plus one">Myself plus one</option>
                </select>
                <div id="guestNameField" style="display: none;"><input type="text" placeholder="Guest's Full Name" id="guestName" oninput="updateMealLabels()"></div>
                <div id="mealSection" style="display: none;">
                    <label id="mainMealLabel">Your Meal Preference</label>
                    <select id="meal1"><option>Standard Meal</option><option>Vegetarian</option><option>Vegan</option><option>Gluten-Free</option></select>
                    <div id="guestMealField" style="display: none;"><label id="guestMealLabel">Guest's Meal Preference</label><select id="meal2"><option>Standard Meal</option><option>Vegetarian</option><option>Vegan</option><option>Gluten-Free</option></select></div>
                </div>
                <div id="allergiesField"><input type="text" placeholder="Any allergies or special requests?" id="notes"></div>
                <button onclick="submitRSVP()">Submit RSVP</button>
            </div>

            <div id="successMessage" style="display: none; margin-top: 2rem; color: #166534; font-size: 1.3rem; text-align: center;">
                ✅ Thank you! Your RSVP has been received.
            </div>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKSToX01nun9g7DX3zMY-r02S4Lx6OengoWeDa2vCTKLOuj5Wd4RzE6P_9uZwC8fE-Ig/exec";

        function checkPassword() {
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return;
            fetch(SCRIPT_URL + "?password=" + encodeURIComponent(pwd))
                .then(r => r.text())
                .then(text => {
                    if (text === "valid") {
                        document.getElementById('passwordSection').style.display = 'none';
                        document.getElementById('choiceSection').style.display = 'block';
                    } else { alert("Incorrect password."); }
                }).catch(() => alert("Network error."));
        }

        function showCheckForm() { document.getElementById('choiceSection').style.display = 'none'; document.getElementById('checkForm').style.display = 'block'; }
        function showSubmitForm() { document.getElementById('choiceSection').style.display = 'none'; document.getElementById('rsvpForm').style.display = 'block'; }

        function toggleGuestFields() {
            const att = document.getElementById('attendance').value;
            document.getElementById('guestNameField').style.display = (att === "Myself plus one") ? 'block' : 'none';
            document.getElementById('guestMealField').style.display = (att === "Myself plus one") ? 'block' : 'none';
            document.getElementById('mealSection').style.display = (att !== "I won't be able to attend") ? 'block' : 'none';
            document.getElementById('allergiesField').style.display = (att !== "I won't be able to attend") ? 'block' : 'none';
            updateMealLabels();
        }

        function updateMealLabels() {
            const n1 = document.getElementById('name').value.trim().split(" ")[0];
            const n2 = document.getElementById('guestName').value.trim().split(" ")[0];
            document.getElementById('mainMealLabel').textContent = n1 ? `${n1}'s Meal Preference` : "Your Meal Preference";
            document.getElementById('guestMealLabel').textContent = n2 ? `${n2}'s Meal Preference` : "Guest's Meal Preference";
        }

        function submitRSVP() {
            const formData = new URLSearchParams({
                name: document.getElementById('name').value, email: document.getElementById('email').value,
                attendance: document.getElementById('attendance').value, guestName: document.getElementById('guestName').value,
                meal1: document.getElementById('meal1').value, meal2: document.getElementById('meal2').value, notes: document.getElementById('notes').value
            });
            fetch(SCRIPT_URL, { method: 'POST', body: formData })
            .then(r => r.text()).then(text => {
                if (text.startsWith("success")) {
                    document.getElementById('rsvpForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else { alert("Error saving."); }
            });
        }

        function checkPreviousRSVP() {
            const email = document.getElementById('checkEmail').value.trim();
            fetch(SCRIPT_URL + '?email=' + encodeURIComponent(email))
                .then(r => r.json()).then(data => {
                    if (data.found) { document.getElementById('checkResult').innerHTML = `<strong>Found!</strong> Name: ${data.name}<br>Attendance: ${data.attendance}`; }
                    else { document.getElementById('checkResult').innerHTML = "No RSVP found."; }
                });
        }
    </script>
</body>
</html>
