<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test RSVP | Katie & Stu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, sans-serif; 
            color: #44403c;
            line-height: 1.7;
        }
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
        }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 110px;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.3rem;
            color: white;
            text-decoration: none;
        }
        .content {
            background: rgba(248, 245, 240, 0.95);
            padding: 3rem 2rem;
            max-width: 950px;
            width: 100%;
            margin: 0 1rem;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.05rem;
        }
        button {
            background: #166534;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #14532d;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Katie &amp; Stu</a>
            <div class="nav-links" id="navLinks">
                <a href="about.html">Our Story</a>
                <a href="gallery.html">Gallery</a>
                <a href="schedule.html">Schedule</a>
                <a href="travel.html">Travel</a>
                <a href="guest-information.html">Guest Information</a>
                <a href="registry.html">Registry</a>
                <a href="rsvp.html">RSVP</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <!-- Test RSVP Content -->
    <div class="hero-bg">
        <div class="content">
            <h1 class="text-5xl mb-8">Test RSVP</h1>
            <p class="text-lg mb-8">Password for testing: <strong>testing</strong></p>

            <input type="password" id="password" placeholder="Enter password">
            <button onclick="checkPassword()">Continue to RSVP</button>

            <!-- Hidden Form -->
            <div id="rsvpForm" style="display: none; margin-top: 2rem; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;">
                <h2 style="text-align: center;">Guest Information</h2>
                <input type="text" placeholder="Full Name" id="name">
                
                <label>Will you be attending?</label>
                <select id="attendance" onchange="toggleGuestName()">
                    <option value="">Please select...</option>
                    <option value="no">I won't be able to attend</option>
                    <option value="one">Just myself</option>
                    <option value="two">Myself plus one</option>
                </select>

                <div id="guestNameField" style="display: none;">
                    <input type="text" placeholder="Guest's Full Name" id="guestName">
                </div>

                <label>Dietary Restrictions / Meal Preference</label>
                <select id="meal">
                    <option>Standard Meal</option>
                    <option>Vegetarian</option>
                    <option>Vegan</option>
                    <option>Gluten-Free</option>
                    <option>Other (please specify below)</option>
                </select>
                <input type="text" placeholder="Any allergies or special requests?" id="notes">

                <button onclick="submitRSVP()" style="background: #166534; margin-top: 1rem;">Submit RSVP</button>
            </div>

            <div id="successMessage" style="display: none; margin-top: 2rem; color: #166534; font-size: 1.3rem;">
                ✅ Thank you! Your RSVP has been received.<br>
                (This is a test — no data was saved)
            </div>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('show');
        });

        function checkPassword() {
            const pass = document.getElementById('password').value.trim();
            if (pass === "testing") {
                document.getElementById('rsvpForm').style.display = 'block';
                document.getElementById('password').style.display = 'none';
            } else {
                alert("Incorrect password. For testing, use: testing");
            }
        }

        function toggleGuestName() {
            const attendance = document.getElementById('attendance').value;
            const guestField = document.getElementById('guestNameField');
            if (attendance === "two") {
                guestField.style.display = 'block';
            } else {
                guestField.style.display = 'none';
            }
        }

        function submitRSVP() {
            document.getElementById('rsvpForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>

</body>
</html>
