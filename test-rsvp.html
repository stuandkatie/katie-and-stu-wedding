<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test RSVP | Katie & Stu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, sans-serif; 
            color: #44403c;
            line-height: 1.7;
            background: #f8f5f0;
        }
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.05rem;
        }
        button {
            background: #166534;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #14532d;
        }
        label {
            display: block;
            margin-top: 1rem;
            text-align: left;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Test RSVP</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Password for testing: <strong>testing</strong></p>

        <input type="password" id="password" placeholder="Enter password">
        <button onclick="checkPassword()">Continue to RSVP</button>

        <!-- Hidden Form -->
        <div id="rsvpForm" style="display: none; margin-top: 2rem;">
            <h2 style="text-align: center;">Guest Information</h2>
            <input type="text" placeholder="Your Full Name" id="name">
            
            <label>Will you be attending?</label>
            <select id="attendance" onchange="toggleGuestFields()">
                <option value="">Please select...</option>
                <option value="no">I won't be able to attend</option>
                <option value="one">Just myself</option>
                <option value="two">Myself plus one</option>
            </select>

            <div id="guestNameField" style="display: none;">
                <input type="text" placeholder="Guest's Full Name" id="guestName">
            </div>

            <!-- Meal Choices -->
            <div id="mealSection" style="display: none;">
                <label>Your Meal Preference</label>
                <select id="meal1">
                    <option>Standard Meal</option>
                    <option>Vegetarian</option>
                    <option>Vegan</option>
                    <option>Gluten-Free</option>
                </select>

                <div id="guestMealField" style="display: none;">
                    <label>Guest's Meal Preference</label>
                    <select id="meal2">
                        <option>Standard Meal</option>
                        <option>Vegetarian</option>
                        <option>Vegan</option>
                        <option>Gluten-Free</option>
                    </select>
                </div>
            </div>

            <input type="text" placeholder="Any allergies or special requests?" id="notes">

            <button onclick="submitRSVP()">Submit RSVP</button>
        </div>

        <div id="successMessage" style="display: none; text-align: center; color: #166534; font-size: 1.4rem; margin-top: 2rem;">
            ✅ Thank you! Your RSVP has been received.<br>
            (This is a test — no data was saved)
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        if (hamburger) hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));

        function checkPassword() {
            if (document.getElementById('password').value.trim() === "testing") {
                document.getElementById('rsvpForm').style.display = 'block';
                document.getElementById('password').style.display = 'none';
            } else {
                alert("Incorrect password. For testing, use: testing");
            }
        }

        function toggleGuestFields() {
            const attendance = document.getElementById('attendance').value;
            const guestField = document.getElementById('guestNameField');
            const guestMealField = document.getElementById('guestMealField');
            const mealSection = document.getElementById('mealSection');

            if (attendance === "no") {
                mealSection.style.display = 'none';
            } else {
                mealSection.style.display = 'block';
                guestField.style.display = (attendance === "two") ? 'block' : 'none';
                guestMealField.style.display = (attendance === "two") ? 'block' : 'none';
            }
        }

        function submitRSVP() {
            document.getElementById('rsvpForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>

</body>
</html>
