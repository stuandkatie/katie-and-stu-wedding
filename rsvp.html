<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Katie &amp; Stu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; color: #44403c; line-height: 1.7; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; text-align: center; font-size: 2.8rem; margin-bottom: 1.5rem; }
        .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('Background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding-top: 110px; }
        
        /* Unified Navigation Styles */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.3rem; color: white; text-decoration: none; white-space: nowrap; }
        .hamburger { display: none; font-size: 2.2rem; background: none; border: none; color: white; cursor: pointer; padding: 5px 10px; }
        .nav-links { display: flex; gap: 10px; }
        .nav-links a { padding: 10px 20px; border-radius: 9999px; font-size: 1.05rem; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.5); transition: all 0.3s; }
        .nav-links a:hover { background: white; color: #44403c; }
        
        .content { background: rgba(248, 245, 240, 0.55); padding: 3rem 2rem; max-width: 950px; width: 100%; margin: 0 1rem; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: rgba(255,255,255,0.98); padding: 1.5rem; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
            .nav-links.show { display: flex; }
            .nav-links a { color: #44403c; text-align: center; font-size: 1.1rem; }
            .logo { font-size: 2rem; }
        }

        input, select, button { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.05rem; box-sizing: border-box; }
        .masked-password-input { -webkit-text-security: disc !important; text-security: disc !important; }
        button { background: #9CAF88; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #7F8F6F; }
        .choice-btn { background: #9CAF88; margin: 12px 0; padding: 16px; font-size: 1.1rem; }
        .choice-btn:hover { background: #7F8F6F; }
        label { display: block; text-align: left; margin: 1.2rem 0 0.5rem 0; font-weight: 500; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Katie &amp; Stu</a>
            <div class="nav-links" id="navLinks">
                <a href="about.html">Our Story</a>
                <a href="gallery.html">Gallery</a>
                <a href="schedule.html">Schedule</a>
                <a href="travel.html">Travel</a>
                <a href="guest-information.html">Guest Information</a>
                <a href="registry.html">Registry</a>
                <a href="rsvp.html">RSVP</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <div class="hero-bg">
        <div class="content">
            <h1>RSVP</h1>

            <div id="passwordSection">
                <p id="passwordPrompt" class="text-lg mb-8" style="text-align: center;">Please enter the password below</p>
                <input type="text" id="password" class="masked-password-input" placeholder="Enter password" autocomplete="off">
                <button onclick="checkPassword()">Continue</button>
            </div>

            </div>
    </div>

    <script>
        // ... (Your existing JavaScript) ...
        function checkPassword() {
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return;

            fetch(SCRIPT_URL + "?password=" + encodeURIComponent(pwd))
                .then(r => r.text())
                .then(text => {
                    if (text === "valid") {
                        document.getElementById('passwordSection').style.display = 'none';
                        document.getElementById('passwordPrompt').style.display = 'none'; // Explicitly hide prompt
                        document.getElementById('choiceSection').style.display = 'block';
                    } else {
                        alert("Incorrect password. Please try again.");
                    }
                })
                .catch(() => alert("Network error. Please try again."));
        }
        // ... (Rest of JS functions) ...
    </script>
</body>
</html>
