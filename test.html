<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Katie & Stu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           GLOBAL VARIABLES & BASE STYLES
           ========================================= */
        :root { 
            --gold: #d4af37;
        }
        
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, sans-serif; 
            color: #44403c;
            line-height: 1.7;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 700; 
            text-align: center; 
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
        }

        /* =========================================
           BACKGROUND & LAYOUT WRAPPERS
           ========================================= */
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 110px; 
        }

        .content {
            background: rgba(248, 245, 240, 0.55);
            padding: 3rem 2rem;
            max-width: 950px;
            width: 100%;
            margin: 0 1rem;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* =========================================
           DESKTOP NAVIGATION STYLES
           ========================================= */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px); 
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap; 
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.3rem;
            color: white;
            text-decoration: none;
            white-space: nowrap; 
        }

        /* Pure styling for the hamburger to prevent global button pollution */
        .hamburger {
            display: none; 
            font-size: 2.2rem;
            background: transparent !important; /* Forces it to match the nav bar */
            border: none !important;
            color: white;
            cursor: pointer;
            padding: 0 !important;
            margin: 0 !important;
            width: auto !important; /* Prevents it from stretching */
            flex-shrink: 0; 
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            padding: 10px 20px;
            border-radius: 9999px; 
            font-size: 1.05rem;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: white;
            color: #44403c;
        }

        /* =========================================
           MOBILE-SPECIFIC STYLES (Max Width: 768px)
           ========================================= */
        @media (max-width: 768px) {
            .nav-container { 
                padding: 0.8rem 1rem; 
            }
            .logo {
                font-size: 1.8rem; 
            }
            .hamburger { 
                display: block; 
                font-size: 2rem; 
            }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 100%; 
                left: 0; right: 0; 
                background: rgba(255,255,255,0.98); 
                padding: 1.5rem;
                gap: 10px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            }
            .nav-links.show { display: flex; } 
            
            .nav-links a { 
                color: #44403c; 
                text-align: center;
                font-size: 1.1rem;
                border: none; 
            }
        }

        /* =========================================
           FORM ELEMENTS (Scoped to .content ONLY)
           ========================================= */
        /* By adding .content in front, we guarantee these never affect the header */
        .content input, .content select, .content button {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.05rem;
            box-sizing: border-box; 
        }

        /* Custom class to mask text without triggering browser save-password prompts */
        .masked-password-input {
            -webkit-text-security: disc !important;
            text-security: disc !important;
        }

        .content button {
            background: #9CAF88; 
            color: white;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .content button:hover { 
            background: #7F8F6F; 
        }

        .choice-btn {
            background: #9CAF88;
            margin: 12px 0;
            padding: 16px;
            font-size: 1.1rem;
        }

        .choice-btn:hover { 
            background: #7F8F6F; 
        }

        label { 
            display: block; 
            text-align: left; 
            margin: 1.2rem 0 0.5rem 0; 
            font-weight: 500; 
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Katie &amp; Stu</a>
            <div class="nav-links" id="navLinks">
                <a href="about.html">Our Story</a>
                <a href="gallery.html">Gallery</a>
                <a href="schedule.html">Schedule</a>
                <a href="travel.html">Travel</a>
                <a href="guest-information.html">Guest Information</a>
                <a href="registry.html">Registry</a>
                <a href="rsvp.html">RSVP</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <div class="hero-bg">
        <div class="content">
            <h1>RSVP</h1>
            
            <div id="passwordSection">
                <p class="text-lg mb-8" style="text-align: center;">Please enter the password below</p>
                <input type="text" id="password" class="masked-password-input" placeholder="Enter password" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
                <button onclick="checkPassword()">Continue</button>
            </div>

            <div id="choiceSection" style="display: none; margin-top: 2rem;">
                <button class="choice-btn" onclick="showCheckForm()">Check My RSVP</button>
                <button class="choice-btn" onclick="showSubmitForm()">Submit New RSVP</button>
            </div>

            <div id="checkForm" style="display: none; margin-top: 2rem;">
                <h2>Check My RSVP</h2>
                <input type="email" id="checkEmail" placeholder="Enter your email">
                <button onclick="checkPreviousRSVP()">Check My RSVP</button>
                <div id="checkResult" style="margin-top: 1.5rem; min-height: 2em;"></div>
            </div>

            <div id="rsvpForm" style="display: none; margin-top: 2rem; text-align: left;">
                <h2 style="text-align: center;">New RSVP</h2>
                
                <input type="text" placeholder="Your Full Name" id="name" required>
                <input type="email" placeholder="Your Email Address" id="email" required>
                
                <label>Will you be attending?</label>
                <select id="attendance" onchange="toggleGuestFields()" required>
                    <option value="">Please select...</option>
                    <option value="I won't be able to attend">I won't be able to attend</option>
                    <option value="Just myself">Just myself</option>
                    <option value="Myself plus one">Myself plus one</option>
                </select>

                <div id="guestNameField" style="display: none;">
                    <input type="text" placeholder="Guest's Full Name" id="guestName">
                </div>

                <div id="mealSection" style="display: none;">
                    <label id="mainMealLabel">Your Meal Preference</label>
                    <select id="meal1">
                        <option>Standard Meal</option>
                        <option>Vegetarian</option>
                        <option>Vegan</option>
                        <option>Gluten-Free</option>
                    </select>

                    <div id="guestMealField" style="display: none;">
                        <label id="guestMealLabel">Guest's Meal Preference</label>
                        <select id="meal2">
                            <option>Standard Meal</option>
                            <option>Vegetarian</option>
                            <option>Vegan</option>
                            <option>Gluten-Free</option>
                        </select>
                    </div>
                </div>

                <div id="allergiesField">
                    <input type="text" placeholder="Any allergies or special requests?" id="notes">
                </div>

                <button onclick="submitRSVP()">Submit RSVP</button>
            </div>

            <div id="successMessage" style="display: none; margin-top: 2rem; color: #166534; font-size: 1.3rem; text-align: center;">
                ✅ Thank you! Your RSVP has been received.<br>
                We can't wait to celebrate with you!
            </div>
        </div>
    </div>

    <script>
        // 1. Mobile Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));

        // 2. Google Apps Script Endpoint
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKSToX01nun9g7DX3zMY-r02S4Lx6OengoWeDa2vCTKLOuj5Wd4RzE6P_9uZwC8fE-Ig/exec";

        // 3. Password Verification Logic
        function checkPassword() {
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return;

            fetch(SCRIPT_URL + "?password=" + encodeURIComponent(pwd))
                .then(r => r.text())
                .then(text => {
                    if (text === "valid") {
                        document.getElementById('passwordSection').style.display = 'none';
                        document.getElementById('choiceSection').style.display = 'block';
                    } else {
                        alert("Incorrect password. Please try again.");
                    }
                })
                .catch(() => alert("Network error. Please try again."));
        }

        // 4. UI Transition Functions
        function showCheckForm() {
            document.getElementById('choiceSection').style.display = 'none';
            document.getElementById('checkForm').style.display = 'block';
        }

        function showSubmitForm() {
            document.getElementById('choiceSection').style.display = 'none';
            document.getElementById('rsvpForm').style.display = 'block';
        }

        // 5. Dynamic Form Field Display Based on Attendance
        function toggleGuestFields() {
            const attendance = document.getElementById('attendance').value;
            
            document.getElementById('guestNameField').style.display = (attendance === "Myself plus one") ? 'block' : 'none';
            document.getElementById('guestMealField').style.display = (attendance === "Myself plus one") ? 'block' : 'none';
            
            document.getElementById('mealSection').style.display = (attendance !== "I won't be able to attend") ? 'block' : 'none';
            document.getElementById('allergiesField').style.display = (attendance !== "I won't be able to attend") ? 'block' : 'none';
        }

        // 6. Submit New RSVP Logic
        function submitRSVP() {
            const attendance = document.getElementById('attendance').value;
            const isAttending = attendance !== "I won't be able to attend";

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                attendance: attendance,
                guestName: document.getElementById('guestName').value || "",
                notes: document.getElementById('notes').value || ""
            };

            if (isAttending) {
                formData.meal1 = document.getElementById('meal1').value || "";
                if (attendance === "Myself plus one") {
                    formData.meal2 = document.getElementById('meal2').value || "";
                }
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: new URLSearchParams(formData)
            })
            .then(r => r.text())
            .then(text => {
                if (text.startsWith("success")) {
                    document.getElementById('rsvpForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    alert("Error saving RSVP. Please try again.");
                }
            })
            .catch(() => alert("Network error."));
        }

        // 7. Check Existing RSVP Logic
        function checkPreviousRSVP() {
            const email = document.getElementById('checkEmail').value.trim();
            const resultDiv = document.getElementById('checkResult');
            
            if (!email) {
                resultDiv.innerHTML = '<span style="color:red;">Please enter your email</span>';
                return;
            }
            
            resultDiv.innerHTML = 'Searching...';

            fetch(SCRIPT_URL + '?email=' + encodeURIComponent(email))
                .then(r => r.text())
                .then(text => {
                    const data = JSON.parse(text);
                    if (data.found) {
                        resultDiv.innerHTML = `
                            <strong>Found your RSVP!</strong><br>
                            Name: ${data.name}<br>
                            Attendance: ${data.attendance}<br>
                            ${data.guestName ? `Guest: ${data.guestName}<br>` : ''}
                            ${data.yourMeal ? `Meal: ${data.yourMeal}<br>` : ''}
                            ${data.guestMeal ? `Guest Meal: ${data.guestMeal}<br>` : ''}
                            ${data.notes ? `Notes: ${data.notes}<br>` : ''}
                            <br><strong>If you need to change something, please contact Katie or Stu.</strong>
                        `;
                    } else {
                        resultDiv.innerHTML = '<strong style="color:black;">No RSVP found for this email.</strong>';
                    }
                })
                .catch(() => resultDiv.innerHTML = '<span style="color:red;">Error checking. Try again.</span>');
        }
    </script>
</body>
</html>
