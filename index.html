<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Katie & Stu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, sans-serif; 
            color: #44403c;
        }
        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
        }
        .nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.3rem;
            color: white;
            text-decoration: none;
        }
        .hamburger {
            display: none;
            font-size: 2rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 10px;
        }
        .nav-links a {
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 1.05rem;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .nav-links a:hover {
            background: white;
            color: #44403c;
        }
        .content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('Background.jpg');
            background-size: cover;
            background-position: center;
            color: white;
        }

        /* Mobile Hamburger */
        @media (max-width: 768px) {
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 100%; 
                left: 0; 
                right: 0; 
                background: rgba(255,255,255,0.95); 
                padding: 1rem; 
                gap: 8px; 
            }
            .nav-links.show { display: flex; }
            .nav-links a { color: #44403c; text-align: center; }
            .hamburger { display: block; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Katie &amp; Stu</a>
            
            <div class="nav-links" id="navLinks">
                <a href="about.html">Our Story</a>
                <a href="gallery.html">Gallery</a>
                <a href="wedding.html">Wedding</a>
                <a href="travel.html">Travel</a>
                <a href="registry.html">Registry</a>
                <a href="guestbook.html">Guest Book</a>
                <a href="rsvp.html">RSVP</a>
            </div>

            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <!-- Under Construction Content -->
    <div class="content">
        <h1 class="text-6xl md:text-7xl mb-6">Gallery</h1>
        <p class="text-2xl md:text-3xl mb-8">Our favorite moments together</p>
        <p class="text-xl max-w-md">We're currently adding photos from our adventures — including our Slovenia trip and more. Come back soon!</p>
        <p class="mt-12 text-amber-100">❤️ Stay tuned</p>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('show');
        });
    </script>

</body>
</html>
