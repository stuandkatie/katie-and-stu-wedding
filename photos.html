<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katie & Stu | Wedding Album</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; color: white; 
            overflow-x: hidden; /* Prevents side-scrolling white space */
        }
        
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)), url('Background.jpg');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .upload-card {
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 16px;
            padding: 2.5rem; max-width: 450px; width: 90%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .header-section {
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; margin-bottom: 1.5rem;
        }

        .header-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0.5rem 0 0 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--gold);
            display: inline-block;
        }

        .file-input {
            width: 100%; padding: 15px; margin: 1rem 0;
            border: 2px dashed rgba(255, 255, 255, 0.6); border-radius: 8px;
            background: rgba(0, 0, 0, 0.2); cursor: pointer; color: white; box-sizing: border-box;
        }

        .btn-primary { 
            background: white; color: #44403c; padding: 14px 36px;
            border-radius: 9999px; border: none; font-weight: 600;
            cursor: pointer; width: 100%; transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-primary:hover:not(:disabled) { background: #f5f5f4; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        @media (max-width: 480px) {
            .upload-card { padding: 1.5rem; width: 95%; }
            .header-section h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="hero-bg">
        <div class="upload-card">
            <div class="header-section">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <h2>Share Your Memories</h2>
            </div>
            
            <form id="uploadForm">
                <div style="text-align: left; margin-bottom: 1rem;">
                    <label style="font-size: 0.9rem;">Your Name:</label>
                    <input type="text" id="guestName" required placeholder="Enter your name"
                           style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;">
                </div>
                
                <input type="file" id="photoFile" accept="image/*" class="file-input" multiple required>
                <button type="submit" id="submitBtn" class="btn-primary">Upload Photos</button>
            </form>
            
            <div id="uploadStatus" style="margin-top: 1.5rem; font-weight: 500; font-size: 0.95rem;"></div>
        </div>
    </header>

    <script>
        const form = document.getElementById("uploadForm");
        const statusText = document.getElementById("uploadStatus");
        const submitBtn = document.getElementById("submitBtn");

        async function uploadSingleFile(file, url) {
            return new Promise((resolve, reject) => {
                const fr = new FileReader();
                fr.readAsDataURL(file);
                fr.onload = (f) => {
                    const payload = {
                        filename: file.name,
                        mimeType: file.type,
                        base64: f.target.result.split(',')[1],
                        guestName: document.getElementById("guestName").value
                    };
                    fetch(url, { method: "POST", body: JSON.stringify(payload) })
                    .then(res => res.ok ? resolve() : reject())
                    .catch(reject);
                };
            });
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const files = document.getElementById("photoFile").files;
            const url = "https://script.google.com/macros/s/AKfycbzLKz47CDuVz74X3hsRSUGCc68yQg5-uP0TPeab1tiCfqLLJcgEqUyJb3lDKk1xDx3b/exec"; // <--- PASTE YOUR DEPLOYED URL HERE
            
            submitBtn.disabled = true;
            statusText.innerText = "Processing...";
            
            for (let i = 0; i < files.length; i++) {
                submitBtn.innerText = `Uploading ${i + 1} of ${files.length}...`;
                await uploadSingleFile(files[i], url).catch(() => console.error("Failed"));
            }
            
            statusText.innerText = "Success! Thank you for sharing your memories.";
            statusText.style.color = "#a7f3d0";
            submitBtn.innerText = "Upload More";
            submitBtn.disabled = false;
            form.reset();
        });
    </script>
</body>
</html>
